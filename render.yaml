services:
  - type: web
    name: thunderroll-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      # Connection string de Neon. Se gestiona en el dashboard de Render
      # (Environment), no en el blueprint, para no exponer credenciales en git.
      # Debe incluir ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: FRONTEND_URL
        value: https://thunderroll.vercel.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: noreply@thunderroll.com
      - key: SMTP_PASSWORD
        value: changeme
      - key: SMTP_FROM
        value: noreply@thunderroll.com
