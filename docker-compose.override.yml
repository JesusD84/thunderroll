services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app:z
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["npm", "run", "dev"]

volumes:
  frontend_node_modules:
    name: thunderrol_frontend_node_modules
  frontend_next:
    name: thunderrol_frontend_next